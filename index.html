<script>
    // Proxy URL add kiya hai taake CORS error na aaye
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6wLoB92RkkkAwO_IC6Bx-8Si5lYfpMpdtRo_e_9RB1DnceQ4aG-5_Cs9QWENrY_ZP9L7MF6psgGwD/pub?output=csv";
    const PROXY_URL = "https://api.allorigins.win/get?url=" + encodeURIComponent(SHEET_CSV_URL);

    async function loadData() {
        try {
            const response = await fetch(PROXY_URL);
            const json = await response.json();
            const data = json.contents; // Yahan data mil raha hai
            
            const rows = data.split('\n').filter(row => row.trim() !== "");
            const list = document.getElementById('monthly-list');
            list.innerHTML = '';
            
            let totalBal = 0, totalExp = 0;

            // Row 1 se shuru (Headers skip karne ke liye)
            for(let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(',');
                if(cols.length >= 3) {
                    const month = cols[0];
                    const bal = parseFloat(cols[1]) || 0;
                    const exp = parseFloat(cols[2]) || 0;
                    
                    totalBal += bal;
                    totalExp += exp;

                    list.innerHTML += `
                        <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border border-slate-100">
                            <span class="font-bold text-slate-700">${month}</span>
                            <div class="text-right">
                                <p class="text-[10px] text-blue-600 font-bold">Bal: ${bal.toLocaleString()}</p>
                                <p class="text-[10px] text-red-500 font-bold">Exp: ${exp.toLocaleString()}</p>
                            </div>
                        </div>`;
                }
            }
            document.getElementById('total-balance').innerText = `Rs. ${totalBal.toLocaleString()}`;
            document.getElementById('total-expenses').innerText = `Rs. ${totalExp.toLocaleString()}`;
        } catch(e) {
            console.error("Error Details:", e);
            document.getElementById('monthly-list').innerHTML = "Data fetch nahi ho pa raha. Internet ya Sheet link check karein.";
        }
    }
    loadData();
</script>
