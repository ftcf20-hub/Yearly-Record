<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTCF Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #f8fafc; }
        .banking-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); }
    </style>
</head>
<body class="pb-10">

    <header class="banking-gradient text-white p-6 rounded-b-[2.5rem] shadow-2xl">
        <h1 class="text-xl font-bold text-center">Family Trust & Care Foundation</h1>
        <p class="text-xs text-center opacity-80 mt-2 italic">"Amanat me khyanat nhi, Behtreen Nizam he Asal Kamyabi Hai"</p>
        <div class="mt-4 bg-white/10 p-2 rounded-xl text-center">
            <span class="text-sm font-semibold tracking-widest">YEARLY REPORT 2026</span>
        </div>
    </header>

    <div class="grid grid-cols-2 gap-4 px-4 -mt-6">
        <div class="bg-white p-5 rounded-2xl shadow-lg border-b-4 border-blue-600">
            <p class="text-[9px] font-bold text-slate-400 uppercase">Total Balance</p>
            <h3 id="total-balance" class="text-lg font-bold text-slate-800">0</h3>
        </div>
        <div class="bg-white p-5 rounded-2xl shadow-lg border-b-4 border-red-500">
            <p class="text-[9px] font-bold text-slate-400 uppercase">Total Expenses</p>
            <h3 id="total-expenses" class="text-lg font-bold text-red-600">0</h3>
        </div>
    </div>

    <div class="px-4 mt-8">
        <h2 class="text-lg font-bold text-slate-800 mb-4">Monthly Overview</h2>
        <div id="monthly-list" class="space-y-3"></div>
    </div>

    <script>
        // SHEET_ID sirf wo hissa hai jo link mein lamba sa code hai
        const S_ID = "1Q6wLoB92RkkkAwO_IC6Bx-8Si5lYfpMpdtRo_e_9RB1DnceQ4aG-5_Cs9QWENrY_ZP9L7MF6psgGwD";
        const url = `https://docs.google.com/spreadsheets/d/1Q6wLoB92RkkkAwO_IC6Bx-8Si5lYfpMpdtRo_e_9RB1DnceQ4aG-5_Cs9QWENrY_ZP9L7MF6psgGwD/gviz/tq?tqx=out:json`;

        fetch(url)
            .then(res => res.text())
            .then(data => {
                const json = JSON.parse(data.substr(47).slice(0, -2));
                const list = document.getElementById('monthly-list');
                let totalB = 0, totalE = 0;

                json.table.rows.forEach(r => {
                    const month = r.c[0]?.v;
                    const bal = r.c[1]?.v || 0;
                    const exp = r.c[2]?.v || 0;
                    
                    totalB += bal; totalE += exp;

                    list.innerHTML += `<div class="bg-white p-4 rounded-xl shadow-sm flex justify-between border">
                        <span class="font-bold">${month}</span>
                        <div class="text-right text-[10px]">
                            <p class="text-blue-600">Bal: ${bal}</p>
                            <p class="text-red-500">Exp: ${exp}</p>
                        </div>
                    </div>`;
                });
                document.getElementById('total-balance').innerText = totalB;
                document.getElementById('total-expenses').innerText = totalE;
            })
            .catch(() => document.body.innerHTML = "<h2 style='text-align:center; margin-top:50px;'>Sheet Link Public Nahi Hai!</h2>");
    </script>
</body>
</html>
