<script>
    const CSV_LINK = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6wLoB92RkkkAwO_IC6Bx-8Si5lYfpMpdtRo_e_9RB1DnceQ4aG-5_Cs9QWENrY_ZP9L7MF6psgGwD/pub?gid=0&single=true&output=csv";

    async function loadData() {
        try {
            const res = await fetch(CSV_LINK);
            const data = await res.text();
            const rows = data.split('\n').slice(1); // Pehli row (headers) skip
            
            const list = document.getElementById('monthly-list');
            list.innerHTML = '';
            let totalB = 0, totalE = 0;

            rows.forEach(row => {
                const cols = row.split(',');
                if(cols.length >= 3) {
                    // Yahan hum comma hata kar number mein convert kar rahe hain
                    const month = cols[0];
                    const bal = parseFloat(cols[1].replace(/,/g, '')) || 0; 
                    const exp = parseFloat(cols[2].replace(/,/g, '')) || 0;
                    
                    totalB += bal;
                    totalE += exp;

                    list.innerHTML += `<div class="bg-white p-4 rounded-xl shadow-sm flex justify-between border">
                        <span class="font-bold">${month}</span>
                        <div class="text-right text-[10px]">
                            <p class="text-blue-600 font-bold">Bal: ${bal.toLocaleString()}</p>
                            <p class="text-red-500 font-bold">Exp: ${exp.toLocaleString()}</p>
                        </div>
                    </div>`;
                }
            });
            // Update Totals
            document.getElementById('total-balance').innerText = "Rs. " + totalB.toLocaleString();
            document.getElementById('total-expenses').innerText = "Rs. " + totalE.toLocaleString();
        } catch (err) {
            console.error(err);
        }
    }
    loadData();
</script>
